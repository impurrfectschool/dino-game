<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Dino Challenge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --accent: #FF6B35;
    --danger: #e53935;
    --gold: #FFD700;
    --panel: rgba(255,255,255,0.93);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  .sky-bg {
    position: fixed; inset: 0;
    background: linear-gradient(180deg, #6ab8e8 0%, #a8d8f0 55%, #d0eefa 100%);
    z-index: 0;
  }
  .cloud {
    position: fixed; background: white; border-radius: 50px;
    opacity: 0.8; z-index: 1; animation: cloudMove linear infinite;
  }
  .cloud::before, .cloud::after {
    content:''; position:absolute; background:white; border-radius:50%;
  }
  .cloud::before { width:60%; height:160%; top:-40%; left:10%; }
  .cloud::after  { width:45%; height:130%; top:-20%; right:10%; }
  @keyframes cloudMove { from{transform:translateX(110vw)} to{transform:translateX(-320px)} }

  .ground {
    position:fixed; bottom:0; left:0; right:0; height:60px;
    background:#8B6914; z-index:2;
  }
  .ground::before {
    content:''; position:absolute; top:-18px; left:0; right:0;
    height:20px; background:#4CAF50; border-radius:4px 4px 0 0;
  }

  /* Dino scene strip above ground */
  .dino-scene {
    position:fixed; bottom:58px; left:0; right:0; height:110px;
    z-index:5; pointer-events:none;
  }
  #dino-canvas { position:absolute; bottom:0; left:0; width:100%; height:100%; }

  /* App */
  #app {
    position:relative; z-index:10; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:20px 10px 100px;
  }
  .game-title {
    font-family:'Press Start 2P',monospace; color:#1a1a1a;
    font-size:clamp(13px,3vw,21px); text-align:center; margin-bottom:14px;
    text-shadow:3px 3px 0 var(--gold),5px 5px 0 rgba(0,0,0,.18); letter-spacing:2px;
  }
  .panel {
    background:var(--panel); border-radius:20px; padding:26px 30px;
    box-shadow:0 8px 32px rgba(0,0,0,.14),0 2px 0 white inset;
    border:3px solid rgba(0,0,0,.09); width:100%; max-width:560px; margin-bottom:14px;
  }

  /* HS bar */
  .high-score-bar { display:flex; gap:12px; width:100%; max-width:560px; margin-bottom:14px; }
  .hs-box {
    flex:1; background:rgba(255,255,255,.88); border-radius:14px;
    padding:10px 14px; text-align:center; border:2px solid rgba(0,0,0,.09);
    box-shadow:0 4px 12px rgba(0,0,0,.09); transition:border-color .3s,background .3s;
  }
  .hs-box .hs-label { font-family:'Press Start 2P',monospace; font-size:7px; color:#999; margin-bottom:4px; display:block; }
  .hs-box .hs-val   { font-family:'Press Start 2P',monospace; font-size:16px; color:var(--gold); text-shadow:1px 1px 0 #b8860b; }
  .hs-box.active-mode { border-color:var(--accent); background:rgba(255,107,53,.07); }

  /* Mode select */
  #mode-screen h2 {
    font-family:'Press Start 2P',monospace; font-size:12px; color:#333;
    margin-bottom:22px; text-align:center; line-height:2;
  }
  .mode-btn {
    display:block; width:100%; padding:16px 20px; margin:10px 0;
    border:3px solid #333; border-radius:14px; cursor:pointer;
    font-family:'Nunito',sans-serif; font-weight:900; font-size:17px; transition:all .12s;
  }
  .mode-btn.easy { background:linear-gradient(135deg,#a8edea,#fed6e3); color:#333; box-shadow:0 5px 0 #888; }
  .mode-btn.hard { background:linear-gradient(135deg,#ffecd2,#fcb69f); color:#333; box-shadow:0 5px 0 #888; }
  .mode-btn:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #888; }
  .mode-btn:active { transform:translateY(3px);  box-shadow:0 2px 0 #888; }
  .mode-btn .btn-sub { font-size:13px; font-weight:700; color:#666; display:block; margin-top:3px; }

  /* Game screen */
  #game-screen { display:none; }
  .hud { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
  .hud-item { background:rgba(255,255,255,.88); border-radius:12px; padding:7px 14px; text-align:center; border:2px solid rgba(0,0,0,.09); min-width:76px; }
  .hud-item .lbl { font-family:'Press Start 2P',monospace; font-size:7px; color:#aaa; display:block; margin-bottom:2px; }
  .hud-item .val { font-family:'Press Start 2P',monospace; font-size:18px; color:#333; }
  #timer-val { color:var(--accent); }
  #timer-val.urgent { color:var(--danger); animation:blink .5s infinite alternate; }
  @keyframes blink { from{opacity:1} to{opacity:.35} }
  #score-val { color:#2e7d32; }
  #score-val.flash-minus { color:var(--danger); animation:shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  .timer-bar-wrap { width:100%; height:13px; background:rgba(0,0,0,.09); border-radius:7px; overflow:hidden; margin-bottom:14px; border:2px solid rgba(0,0,0,.08); }
  #timer-bar { height:100%; border-radius:7px; transition:width 1s linear,background 1s; width:100%; background:linear-gradient(90deg,#4CAF50,#8BC34A); }

  .question-box { text-align:center; padding:18px; background:linear-gradient(135deg,#fff9c4,#fff3e0); border-radius:16px; border:3px solid #f9a825; margin-bottom:14px; }
  .question-box .q-text { font-family:'Press Start 2P',monospace; font-size:clamp(17px,5vw,28px); color:#333; letter-spacing:2px; }

  .answer-row { display:flex; gap:10px; margin-bottom:12px; }
  #answer-input {
    flex:1; padding:13px 18px; font-family:'Press Start 2P',monospace; font-size:20px;
    border:3px solid #333; border-radius:12px; text-align:center; background:white; color:#333;
    outline:none; transition:border-color .2s,box-shadow .2s;
  }
  #answer-input:focus   { border-color:var(--accent); box-shadow:0 0 0 4px rgba(255,107,53,.18); }
  #answer-input.correct { border-color:#4CAF50; background:#f1fff1; }
  #answer-input.wrong   { border-color:var(--danger); background:#fff1f1; }

  #submit-btn {
    padding:13px 20px; background:var(--accent); color:white; border:3px solid #333;
    border-radius:12px; font-family:'Press Start 2P',monospace; font-size:11px;
    cursor:pointer; box-shadow:0 5px 0 #b84200; transition:all .1s;
  }
  #submit-btn:hover  { transform:translateY(-2px); }
  #submit-btn:active { transform:translateY(3px); box-shadow:0 2px 0 #b84200; }

  #feedback { font-family:'Press Start 2P',monospace; font-size:12px; text-align:center; height:20px; margin-bottom:10px; }
  #feedback.correct { color:#2e7d32; }
  #feedback.wrong   { color:var(--danger); }

  .ctrl-row { display:flex; gap:10px; justify-content:center; }
  .ctrl-btn { padding:9px 20px; border:3px solid #333; border-radius:10px; font-family:'Press Start 2P',monospace; font-size:9px; cursor:pointer; transition:all .1s; box-shadow:0 4px 0 #888; }
  #pause-btn   { background:#fff176; color:#333; }
  #restart-btn { background:#ef9a9a; color:#333; }
  .ctrl-btn:hover  { transform:translateY(-2px); box-shadow:0 6px 0 #888; }
  .ctrl-btn:active { transform:translateY(2px);  box-shadow:0 2px 0 #888; }

  /* Pause overlay */
  #paused-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.52); z-index:999; align-items:center; justify-content:center; }
  #paused-overlay.show { display:flex; }
  .pause-box { background:white; padding:38px 48px; border-radius:20px; text-align:center; border:4px solid #333; }
  .pause-box h2 { font-family:'Press Start 2P',monospace; font-size:18px; margin-bottom:20px; color:#333; }
  #resume-btn { padding:13px 26px; background:#4CAF50; color:white; border:3px solid #333; border-radius:12px; font-family:'Press Start 2P',monospace; font-size:11px; cursor:pointer; box-shadow:0 5px 0 #2e7d32; }
  #resume-btn:active { transform:translateY(3px); box-shadow:0 2px 0 #2e7d32; }

  /* End screen */
  #end-screen { display:none; text-align:center; }
  #end-screen h2 { font-family:'Press Start 2P',monospace; font-size:clamp(13px,4vw,19px); margin-bottom:18px; color:#333; }
  .final-score { font-family:'Press Start 2P',monospace; font-size:clamp(26px,8vw,46px); color:var(--accent); text-shadow:3px 3px 0 #b84200; margin-bottom:6px; }
  .final-label { font-family:'Press Start 2P',monospace; font-size:9px; color:#999; margin-bottom:18px; }
  .new-record  { font-family:'Press Start 2P',monospace; font-size:12px; color:var(--gold); text-shadow:1px 1px 0 #b8860b; animation:bounce .6s infinite alternate; margin-bottom:14px; }
  @keyframes bounce { from{transform:scale(1)} to{transform:scale(1.1)} }
  .end-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:8px; }
  .end-btn { padding:13px 22px; border:3px solid #333; border-radius:12px; font-family:'Press Start 2P',monospace; font-size:9px; cursor:pointer; transition:all .1s; }
  .end-btn.play-again  { background:#4CAF50; color:white; box-shadow:0 5px 0 #2e7d32; }
  .end-btn.change-mode { background:white; color:#333; box-shadow:0 5px 0 #888; }
  .end-btn:active { transform:translateY(3px); box-shadow:0 2px 0 #888; }

  /* Score popup */
  .score-popup { position:fixed; font-family:'Press Start 2P',monospace; font-size:15px; pointer-events:none; z-index:200; animation:floatUp .9s forwards; }
  .score-popup.plus  { color:#2e7d32; text-shadow:1px 1px 0 white; }
  .score-popup.minus { color:var(--danger); text-shadow:1px 1px 0 white; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-55px) scale(1.3)} }
</style>
</head>
<body>
<div class="sky-bg"></div>
<div class="cloud" style="width:130px;height:44px;top:7%;animation-duration:30s;animation-delay:-4s"></div>
<div class="cloud" style="width:85px;height:30px;top:17%;animation-duration:22s;animation-delay:-14s"></div>
<div class="cloud" style="width:160px;height:52px;top:4%;animation-duration:38s;animation-delay:-22s"></div>
<div class="cloud" style="width:95px;height:34px;top:26%;animation-duration:20s;animation-delay:-2s"></div>

<div class="dino-scene">
  <canvas id="dino-canvas"></canvas>
</div>
<div class="ground"></div>

<div id="paused-overlay">
  <div class="pause-box">
    <h2>⏸ PAUSED</h2>
    <button id="resume-btn" onclick="resumeGame()">▶ RESUME</button>
  </div>
</div>

<div id="app">
  <div class="game-title">🦕 MATH DINO 🦕</div>

  <div class="high-score-bar">
    <div class="hs-box" id="hs-easy-box">
      <span class="hs-label">± BEST</span>
      <div class="hs-val" id="hs-easy">0</div>
    </div>
    <div class="hs-box" id="hs-hard-box">
      <span class="hs-label">×÷ BEST</span>
      <div class="hs-val" id="hs-hard">0</div>
    </div>
  </div>

  <div class="panel" id="mode-screen">
    <h2>CHOOSE<br>YOUR MODE!</h2>
    <button class="mode-btn easy" onclick="startGame('easy')">
      ➕ ➖ Easy Mode
      <span class="btn-sub">Addition &amp; Subtraction only</span>
    </button>
    <button class="mode-btn hard" onclick="startGame('hard')">
      ✖️ ➗ Hard Mode
      <span class="btn-sub">All four operations!</span>
    </button>
  </div>

  <div class="panel" id="game-screen">
    <div class="hud">
      <div class="hud-item"><span class="lbl">SCORE</span><span class="val" id="score-val">0</span></div>
      <div class="hud-item"><span class="lbl">TIME</span><span class="val" id="timer-val">60</span></div>
      <div class="hud-item"><span class="lbl">BEST</span><span class="val" id="current-best">0</span></div>
    </div>
    <div class="timer-bar-wrap"><div id="timer-bar"></div></div>
    <div class="question-box"><div class="q-text" id="question-text">? + ? = ?</div></div>
    <div id="feedback"></div>
    <div class="answer-row">
      <input type="number" id="answer-input" placeholder="?" autocomplete="off" inputmode="numeric"
        onkeydown="if(event.key==='Enter')submitAnswer()">
      <button id="submit-btn" onclick="submitAnswer()">GO!</button>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" id="pause-btn"   onclick="pauseGame()">⏸ PAUSE</button>
      <button class="ctrl-btn" id="restart-btn" onclick="restartGame()">🔄 RESTART</button>
    </div>
  </div>

  <div class="panel" id="end-screen">
    <h2>TIME'S UP! 🦕</h2>
    <div class="final-score" id="final-score">0</div>
    <div class="final-label">POINTS SCORED</div>
    <div class="new-record" id="new-record-msg" style="display:none">🏆 NEW HIGH SCORE! 🏆</div>
    <div class="end-btns">
      <button class="end-btn play-again"  onclick="playAgain()">▶ PLAY AGAIN</button>
      <button class="end-btn change-mode" onclick="changeMode()">🔀 CHANGE MODE</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  CANVAS DINO + WIFI RENDERER
// ════════════════════════════════════════
const canvas = document.getElementById('dino-canvas');
const ctx    = canvas.getContext('2d');

const WIFI_COUNT = 12;
const S = 3; // pixel scale

// Dino state
const dino = {
  x: 24, targetX: 24,
  legPhase: 0,   // 0-1 running cycle
  chompT: 0,     // 0=closed, animates 0→1→0
  sadTimer: 0,   // seconds to show sad face
  idleT: 0,      // for idle bob
};

// WiFi targets
let wifiSlots = []; // {x, alive, popT}

let rafId = null, lastTs = 0, sceneRunning = false;

// ── Resize ──
function resizeCanvas() {
  const scene = canvas.parentElement;
  canvas.width  = scene.offsetWidth;
  canvas.height = scene.offsetHeight;
  rebuildWifi();
}

function rebuildWifi() {
  const W = canvas.width;
  const startX = 120, endX = W - 55;
  const gap = (endX - startX) / Math.max(1, WIFI_COUNT - 1);
  wifiSlots = Array.from({length: WIFI_COUNT}, (_, i) => ({
    x: Math.round(startX + i * gap),
    alive: true,
    popT: 0,
  }));
}

// ── Draw pixel rect helper ──
function pr(c, color, bx, baseY) {
  // c = {col, row, w, h}
  ctx.fillStyle = color;
  ctx.fillRect(bx + c.col*S, baseY - c.row*S - c.h*S, c.w*S, c.h*S);
}

// ── Draw dino ──
function drawDino(bx, baseY) {
  const G  = '#3d8c3d';
  const GL = '#5cb85c';
  const GD = '#276127';
  const WH = '#ffffff';
  const BK = '#111111';

  // Idle bob
  const bob = dino.sadTimer > 0 ? 0 : Math.sin(dino.idleT * 2.2) * 1.5;
  const by  = baseY - Math.round(bob);

  // TAIL
  pr({col:-4,row:7,w:3,h:2}, GD, bx, by);
  pr({col:-5,row:6,w:2,h:1}, GD, bx, by);

  // BODY
  pr({col:0,row:5,w:10,h:8}, G, bx, by);

  // SPINE SPIKES
  pr({col:1,row:13,w:2,h:3}, GL, bx, by);
  pr({col:3,row:13,w:2,h:5}, GL, bx, by);
  pr({col:5,row:13,w:2,h:4}, GL, bx, by);
  pr({col:7,row:13,w:2,h:2}, GL, bx, by);

  // HEAD
  pr({col:7,row:10,w:7,h:8}, G, bx, by);

  // UPPER SNOUT
  pr({col:11,row:12,w:5,h:3}, GL, bx, by);

  // LOWER JAW – drops open when chomping
  const chompDrop = Math.round(Math.sin(dino.chompT * Math.PI) * 3);
  ctx.fillStyle = G;
  ctx.fillRect(bx + 11*S, by - (8-chompDrop)*S - 3*S, 5*S, 3*S);

  // TEETH (upper only)
  pr({col:12,row:10,w:1,h:1}, WH, bx, by);
  pr({col:14,row:10,w:1,h:1}, WH, bx, by);

  // EYE
  if (dino.sadTimer > 0) {
    // X eyes when sad
    ctx.strokeStyle = BK; ctx.lineWidth = 2.2; ctx.lineCap = 'round';
    const ex = bx + 13*S, ey = by - 15.5*S;
    ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(ex+S*2.2, ey+S*2.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex+S*2.2, ey); ctx.lineTo(ex, ey+S*2.2); ctx.stroke();
  } else {
    pr({col:13,row:16,w:3,h:3}, WH, bx, by);
    pr({col:14,row:15,w:2,h:2}, BK, bx, by);
    pr({col:14,row:15,w:1,h:1}, WH, bx, by);
  }

  // NOSTRIL
  pr({col:15,row:13,w:1,h:1}, GD, bx, by);

  // ARM
  pr({col:8,row:7,w:3,h:2}, GL, bx, by);
  pr({col:10,row:8,w:2,h:1}, GL, bx, by);

  // LEGS – alternating stride
  const isRunning = Math.abs(dino.targetX - dino.x) > 1 || dino.legPhase % 1 > 0;
  const swing = isRunning ? Math.sin(dino.legPhase * Math.PI * 2) * S * 1.6 : 0;

  // Left leg
  ctx.fillStyle = GD;
  ctx.fillRect(bx + 2*S, by - 5*S, 3*S, 5*S + swing);
  // Left foot
  ctx.fillRect(bx + 1*S, by - 1.5*S, 5*S, 2*S);

  // Right leg
  ctx.fillRect(bx + 6*S, by - 5*S, 3*S, 5*S - swing);
  // Right foot
  ctx.fillRect(bx + 5*S, by - 1.5*S, 5*S, 2*S);
}

// ── Draw wifi ──
function drawWifi(cx, cy, alpha, scale) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  const color = scale > 1 ? '#ff6b35' : '#1565C0';
  ctx.strokeStyle = color;
  ctx.fillStyle   = color;
  ctx.lineCap = 'round';

  [[22,4],[14,4],[7,3]].forEach(([r,lw]) => {
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.arc(0, 0, r, Math.PI*1.18, Math.PI*1.82);
    ctx.stroke();
  });
  ctx.beginPath();
  ctx.arc(0, 3, 4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ── Main render loop ──
function renderLoop(ts) {
  if (!sceneRunning) return;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Move dino
  const dx = dino.targetX - dino.x;
  if (Math.abs(dx) > 0.4) {
    dino.x += dx * Math.min(1, dt * 7);
    dino.legPhase += dt * 5;
  } else {
    dino.x = dino.targetX;
  }

  // Timers
  dino.idleT   += dt;
  if (dino.chompT > 0) { dino.chompT += dt * 5; if (dino.chompT >= 1) dino.chompT = 0; }
  if (dino.sadTimer > 0) dino.sadTimer -= dt;

  // Draw wifi symbols
  const wY = H - 30;
  for (const s of wifiSlots) {
    if (s.alive) {
      drawWifi(s.x, wY, 0.85, 1);
    } else if (s.popT > 0) {
      const alpha = s.popT;
      const scale = 1 + (1 - s.popT) * 0.8;
      drawWifi(s.x, wY, alpha, scale);
      s.popT -= dt * 3;
    }
  }

  // Draw dino
  drawDino(Math.round(dino.x), H);

  rafId = requestAnimationFrame(renderLoop);
}

function startScene() {
  sceneRunning = true;
  lastTs = performance.now();
  if (rafId) cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(renderLoop);
}

function stopScene() {
  sceneRunning = false;
  if (rafId) cancelAnimationFrame(rafId);
}

function resetDinoPos() {
  dino.x = 24; dino.targetX = 24;
  dino.legPhase = 0; dino.chompT = 0; dino.sadTimer = 0; dino.idleT = 0;
}

// Called on correct answer
function dinoEat() {
  const next = wifiSlots.find(s => s.alive);
  if (!next) return;
  dino.targetX = next.x - 48;
  setTimeout(() => {
    next.alive = false; next.popT = 1;
    dino.chompT = 0.01;
  }, 620);
}

// Called on wrong answer
function dinoSad() {
  dino.targetX = Math.max(24, dino.x - 35);
  dino.sadTimer = 1.4;
}

// ════════════════════════════════════════
//  GAME LOGIC
// ════════════════════════════════════════
let score=0, timeLeft=60, gameTimer=null, isPaused=false;
let currentMode=null, correctAnswer=0, gameActive=false;
let highScores = {easy:0, hard:0};

function loadHS() {
  try { const s=localStorage.getItem('mathDinoHS'); if(s) highScores=JSON.parse(s); } catch(e){}
  updateHSDisplay();
}
function saveHS() {
  try { localStorage.setItem('mathDinoHS', JSON.stringify(highScores)); } catch(e){}
}
function updateHSDisplay() {
  document.getElementById('hs-easy').textContent = highScores.easy;
  document.getElementById('hs-hard').textContent = highScores.hard;
  document.getElementById('current-best').textContent = highScores[currentMode]||0;
  document.getElementById('hs-easy-box').classList.toggle('active-mode', currentMode==='easy');
  document.getElementById('hs-hard-box').classList.toggle('active-mode', currentMode==='hard');
}

function startGame(mode) {
  currentMode=mode; score=0; timeLeft=60; isPaused=false; gameActive=true;
  document.getElementById('mode-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='block';
  updateHSDisplay(); updateScoreDisplay(); updateTimerDisplay(); updateTimerBar();
  resizeCanvas(); resetDinoPos(); startScene();
  generateQuestion();
  document.getElementById('answer-input').focus();
  clearInterval(gameTimer);
  gameTimer = setInterval(tick, 1000);
}

function tick() {
  if (isPaused||!gameActive) return;
  timeLeft--; updateTimerDisplay(); updateTimerBar();
  if (timeLeft<=0) endGame();
}

function pauseGame() {
  if (!gameActive) return;
  isPaused=true;
  document.getElementById('paused-overlay').classList.add('show');
  document.getElementById('pause-btn').textContent='⏸ PAUSED';
}
function resumeGame() {
  isPaused=false;
  document.getElementById('paused-overlay').classList.remove('show');
  document.getElementById('pause-btn').textContent='⏸ PAUSE';
  document.getElementById('answer-input').focus();
}
function restartGame() { clearInterval(gameTimer); startGame(currentMode); }

function endGame() {
  clearInterval(gameTimer); gameActive=false; stopScene();
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='block';
  document.getElementById('final-score').textContent=score;
  const isNew = score>highScores[currentMode];
  if (isNew) { highScores[currentMode]=score; saveHS(); updateHSDisplay(); }
  document.getElementById('new-record-msg').style.display=isNew?'block':'none';
}

function playAgain()  { startGame(currentMode); }
function changeMode() {
  clearInterval(gameTimer); gameActive=false; currentMode=null; stopScene();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='none';
  document.getElementById('mode-screen').style.display='block';
  document.getElementById('hs-easy-box').classList.remove('active-mode');
  document.getElementById('hs-hard-box').classList.remove('active-mode');
  startScene(); // keep dino visible on menu
}

// ── Questions ──
function generateQuestion() {
  const ops = currentMode==='easy' ? ['+','-'] : ['+','-','×','÷'];
  const op  = ops[Math.floor(Math.random()*ops.length)];
  let a,b,display;
  const isEasy = currentMode==='easy';
  if (op==='+') { a=rand(1,isEasy?20:30);b=rand(1,isEasy?20:30); correctAnswer=a+b; display=`${a} + ${b} = ?`; }
  else if (op==='-') { a=rand(2,isEasy?20:30);b=rand(1,a); correctAnswer=a-b; display=`${a} - ${b} = ?`; }
  else if (op==='×') { a=rand(2,9);b=rand(2,9); correctAnswer=a*b; display=`${a} × ${b} = ?`; }
  else { b=rand(2,9); correctAnswer=rand(2,9); a=b*correctAnswer; display=`${a} ÷ ${b} = ?`; }
  document.getElementById('question-text').textContent=display;
  const inp=document.getElementById('answer-input');
  inp.value=''; inp.classList.remove('correct','wrong');
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';
}

function rand(min,max) { return Math.floor(Math.random()*(max-min+1))+min; }

function submitAnswer() {
  if (!gameActive||isPaused) return;
  const inp=document.getElementById('answer-input');
  const val=parseInt(inp.value,10);
  if (isNaN(val)) return;
  const fb=document.getElementById('feedback');
  const sv=document.getElementById('score-val');
  if (val===correctAnswer) {
    score++;
    inp.classList.add('correct');
    fb.textContent='✓ CORRECT!'; fb.className='correct';
    sv.classList.remove('flash-minus'); void sv.offsetWidth;
    showPopup('+1',true); dinoEat();
  } else {
    score=Math.max(0,score-1);
    inp.classList.add('wrong');
    fb.textContent=`✗ It was ${correctAnswer}`; fb.className='wrong';
    sv.classList.add('flash-minus'); void sv.offsetWidth;
    setTimeout(()=>sv.classList.remove('flash-minus'),350);
    showPopup('-1',false); dinoSad();
  }
  updateScoreDisplay();
  setTimeout(()=>{ generateQuestion(); document.getElementById('answer-input').focus(); }, 380);
}

function updateScoreDisplay() { document.getElementById('score-val').textContent=score; }
function updateTimerDisplay() {
  const el=document.getElementById('timer-val');
  el.textContent=timeLeft; el.classList.toggle('urgent',timeLeft<=10);
}
function updateTimerBar() {
  const bar=document.getElementById('timer-bar'), pct=(timeLeft/60)*100;
  bar.style.width=pct+'%';
  bar.style.background = pct>50
    ? 'linear-gradient(90deg,#4CAF50,#8BC34A)'
    : pct>20 ? 'linear-gradient(90deg,#FF9800,#FFC107)'
             : 'linear-gradient(90deg,#e53935,#FF5722)';
}
function showPopup(text,isPlus) {
  const pop=document.createElement('div');
  pop.className='score-popup '+(isPlus?'plus':'minus');
  pop.textContent=text;
  const box=document.getElementById('score-val').getBoundingClientRect();
  pop.style.left=(box.left+box.width/2-15)+'px';
  pop.style.top=(box.top-10)+'px';
  document.body.appendChild(pop);
  setTimeout(()=>pop.remove(),900);
}

// ── Init ──
loadHS();
resizeCanvas();
startScene(); // Show animated idle dino on menu

window.addEventListener('resize',()=>resizeCanvas());
document.addEventListener('keydown',e=>{
  if (e.code==='Space'&&isPaused) { e.preventDefault(); resumeGame(); }
});
</script>
